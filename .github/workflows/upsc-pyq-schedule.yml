name: UPSC PYQ Telegram Bot

on:
  schedule:
    # IST = UTC+5:30. GitHub Actions cron is in UTC.
    # 5:00 AM IST  -> 23:30 UTC (previous day)
    - cron: "30 23 * * *"
    # 7:50 PM IST  -> 14:20 UTC
    - cron: "20 14 * * *"
  workflow_dispatch:
    inputs:
      job:
        description: "Which job to run manually"
        required: true
        default: "post_question"
        type: choice
        options:
          - post_question
          - post_answer

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Determine which job to run
        id: which_job
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "script=${{ github.event.inputs.job }}.py" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "30 23 * * *" ]; then
            echo "script=post_question.py" >> "$GITHUB_OUTPUT"
          else
            echo "script=post_answer.py" >> "$GITHUB_OUTPUT"
          fi

      - name: Run bot script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID: ${{ secrets.TELEGRAM_THREAD_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python ${{ steps.which_job.outputs.script }}
        working-directory: scripts

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/used_questions.json state/pending.json
          git diff --cached --quiet || git commit -m "chore: update bot state [skip ci]"
          git push
